name: grocery_billing
description: Offline Grocery Billing App with Bengali/English Voice Support
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # SQLite offline storage
  sqflite: ^2.3.2
  path_provider: ^2.1.3
  path: ^1.9.0

  # Voice recognition (Bengali + English)
  speech_to_text: ^7.0.0
  permission_handler: ^11.3.1

  # PDF generation + sharing
  pdf: ^3.11.1
  printing: ^5.13.1

  # State management
  provider: ^6.1.2

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.3.3
  flutter_svg: ^2.0.10+1

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

# App Icon generator config
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/shop_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1B5E20"
  adaptive_icon_foreground: "assets/images/shop_logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: NotoSansBengali
      fonts:
        - asset: assets/fonts/NotoSansBengali-Regular.ttf
        - asset: assets/fonts/NotoSansBengali-Bold.ttf
          weight: 700
